name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build app
        run: ./Scripts/build-app.sh
      - name: Make DMG
        run: ./Scripts/make-dmg.sh
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/Tuck-*.dmg \
            --title "Tuck $GITHUB_REF_NAME" \
            --generate-notes
